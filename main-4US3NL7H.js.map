<div
  class="image"
  ghs-pointer-input
  (singleClick)="toggleFigure()"
  (doubleClick)="imageDialog()"
  [onRelease]="true"
  [ngClass]="{
    disabled: disabled,
    'full-ability': settingsManager.settings.showFullAbilityCard,
    modern: settingsManager.settings.theme == 'modern'
  }"
  [ghs-label]="gameManager.game.state == GameState.next ? (active ? 'game.figure.endTurn' : 'game.figure.startTurn') : ''"
  [ghs-label-attribute]="'title'"
>
  @if (!monster.noThumbnail && settingsManager.settings.artwork) {
    <img [ngClass]="{ 'active-border': active }" [src]="gameManager.monsterManager.monsterThumbnail(monster)" />
  }
  @if (monster.noThumbnail || !settingsManager.settings.artwork) {
    <span class="no-artwork" [ngClass]="{ 'active-border': active, off: off }">
      <span class="letter">
        @for (namePart of settingsManager.getLabel('data.monster.' + monster.name).split(' '); track namePart) {
          <span>{{ namePart[0] }}</span>
        }
      </span>
      <span class="name"><span [ghs-label]="'data.monster.' + monster.name"></span></span>
    </span>
  }
</div>

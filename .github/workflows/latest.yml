name: Publish Latest Online Version

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
      - '!v*-*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Node 24.x
        uses: actions/setup-node@v5
        with:
          node-version: 24.x
          cache: npm
      - name: npm install and npm run build
        run: |
          npm ci
          npm run build -- --configuration production
      - name: Publish via scp
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.PORT }}" "${{ secrets.HOST }}" >> ~/.ssh/known_hosts
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.PORT }}" \
            ./dist/gloomhavensecretariat/ \
            "${{ secrets.USER }}@${{ secrets.HOST }}:${{ secrets.TARGET }}/"

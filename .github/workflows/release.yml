name: Build and publish release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
      - '!v*-*'

jobs:
  create_release:
    name: Create release
    runs-on: ubuntu-latest
    steps:
      - name: Create draft release
        run: gh release create "${{ github.ref_name }}" --draft --title "${{ github.ref_name }}" --generate-notes --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}

  release_zip:
    name: Release zip
    needs: create_release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Cache node modules
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Node 24x
        uses: actions/setup-node@v5
        with:
          node-version: 24.x
      - name: npm install and npm run build
        run: |
          npm ci
          npm run build -- --configuration production,unbranded
      - name: Create Zip
        run: cd dist/gloomhavensecretariat && zip -r "gloomhavensecretariat-${{ github.ref_name }}.zip" .
      - name: Upload release zip
        run: gh release upload "${{ github.ref_name }}" "./dist/gloomhavensecretariat/gloomhavensecretariat-${{ github.ref_name }}.zip" --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}

  release_electron:
    name: Release electron builds
    needs: create_release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v5
      - name: Cache node modules
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Node 24.x
        uses: actions/setup-node@v5
        with:
          node-version: 24.x
      - name: npm install and npm run electron:build
        run: |
          npm ci
          npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}

  release_android:
    name: Release Android APK
    needs: create_release
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v5
      - name: Cache node modules
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Setup Node 24.x
        uses: actions/setup-node@v5
        with:
          node-version: 24.x
          cache: npm
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - name: Install dependencies
        run: npm ci
      - name: Build Angular app
        run: npm run build
      - name: Add Capacitor Android platform
        run: npx cap add android || echo "Android platform already exists"
      - name: Generate Android assets
        run: |
          if [ -f resources/icon.png ]; then
            npx capacitor-assets generate --android
          else
            echo "No resources/icon.png found, skipping asset generation"
          fi
      - name: Sync Capacitor
        run: npx cap sync android
      - name: Patch Android
        run: npm run patch-android
      - name: Decode Android keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release-key.jks

      - name: Configure signing via gradle.properties
        run: |
          echo "GHS_APP_STORE_FILE=$(pwd)/android/app/release-key.jks" >> android/gradle.properties
          echo "GHS_APP_KEY_ALIAS=${ANDROID_KEY_ALIAS}" >> android/gradle.properties
          echo "GHS_APP_STORE_PASSWORD=${ANDROID_KEYSTORE_PASSWORD}" >> android/gradle.properties
          echo "GHS_APP_KEY_PASSWORD=${ANDROID_KEY_PASSWORD}" >> android/gradle.properties
      - name: Build signed APK
        run: |
          cd android
          ./gradlew assembleRelease
      - name: Upload APK to draft release
        run: |
          mv "android/app/build/outputs/apk/release/app-release.apk" "android/app/build/outputs/apk/release/gloomhavensecretariat-${{ github.ref_name }}.apk"
          gh release upload "${{ github.ref_name }}" "android/app/build/outputs/apk/release/gloomhavensecretariat-${{ github.ref_name }}.apk" --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}

  publish:
    name: Publish Draft Release
    needs: [create_release, release_zip, release_electron, release_android]
    runs-on: ubuntu-latest
    steps:
      - name: Publish draft release
        run: gh release edit "${{ github.ref_name }}" --draft=false --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}

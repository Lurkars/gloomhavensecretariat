name: Build and publish release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
      - '!v*-*'

jobs:
  create_release:
    name: Create release
    runs-on: ubuntu-latest
    steps:
      - name: Create draft release
        run: gh release create "${{ github.ref_name }}" --draft --title "${{ github.ref_name }}" --generate-notes --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}

  release_zip:
    name: Release zip
    needs: create_release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Cache node modules
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Node 24x
        uses: actions/setup-node@v5
        with:
          node-version: 24.x
      - name: npm install and npm run build
        run: |
          npm ci
          npm run build -- --configuration unbranded
      - name: Create Zip
        run: cd dist/gloomhavensecretariat && zip -r "gloomhavensecretariat-${{ github.ref_name }}.zip" .
      - name: Upload release zip
        run: gh release upload "${{ github.ref_name }}" "./dist/gloomhavensecretariat/gloomhavensecretariat-${{ github.ref_name }}.zip" --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}

  release_electron:
    name: Release electron builds
    needs: create_release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v5
      - name: Cache node modules
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Node 24.x
        uses: actions/setup-node@v5
        with:
          node-version: 24.x
      - name: npm install and npm run electron:build
        run: |
          npm ci
          npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}

  release_android:
    name: Release Android APK
    needs: create_release
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v5
      - name: Cache node modules
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Setup Node 24.x
        uses: actions/setup-node@v5
        with:
          node-version: 24.x
          cache: npm
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - name: Install dependencies
        run: npm ci
      - name: Build Angular app
        run: npm run build
      - name: Add Capacitor Android platform
        run: npx cap add android || echo "Android platform already exists"
      - name: Generate Android assets
        run: |
          if [ -f resources/icon.png ]; then
            npx capacitor-assets generate --android
          else
            echo "No resources/icon.png found, skipping asset generation"
          fi
      - name: Sync Capacitor
        run: npx cap sync android
      - name: Patch Android version
        run: |
          python <<'PY'
          import os, re
          from pathlib import Path

          tag = os.environ.get("GITHUB_REF_NAME", "")
          version_name = tag.lstrip("v") or "1.0"

          parts = re.split(r'[.\-]', version_name)
          try:
              major, minor, patch = int(parts[0]), int(parts[1]) if len(parts) > 1 else 0, int(parts[2]) if len(parts) > 2 else 0
          except ValueError:
              major, minor, patch = 1, 0, 0
          version_code = major * 1_000_000 + minor * 1_000 + patch

          gradle = Path("android/app/build.gradle")
          text = gradle.read_text()
          text = re.sub(r'versionCode\s+\d+', f'versionCode {version_code}', text)
          text = re.sub(r'versionName\s+"[^"]*"', f'versionName "{version_name}"', text)
          gradle.write_text(text)
          print(f"Set versionName={version_name}, versionCode={version_code}")
          PY
      - name: Decode Android keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release-key.jks

      - name: Configure signing via gradle.properties
        run: |
          echo "GHS_APP_STORE_FILE=$(pwd)/android/app/release-key.jks" >> android/gradle.properties
          echo "GHS_APP_KEY_ALIAS=${ANDROID_KEY_ALIAS}" >> android/gradle.properties
          echo "GHS_APP_STORE_PASSWORD=${ANDROID_KEYSTORE_PASSWORD}" >> android/gradle.properties
          echo "GHS_APP_KEY_PASSWORD=${ANDROID_KEY_PASSWORD}" >> android/gradle.properties
      - name: Patch generated Android signing config
        run: |
          python <<'PY'
          from pathlib import Path
          import re

          gradle = Path("android/app/build.gradle")
          if not gradle.exists():
              raise SystemExit("android/app/build.gradle not found")

          text = gradle.read_text()

          if "GHS_APP_STORE_FILE" in text and "signingConfig signingConfigs.release" in text:
              print("Signing config already present")
              raise SystemExit(0)

          signing_block = """
              signingConfigs {
                  release {
                      if (project.hasProperty("GHS_APP_STORE_FILE")) {
                          storeFile file(project.property("GHS_APP_STORE_FILE"))
                          storePassword project.property("GHS_APP_STORE_PASSWORD")
                          keyAlias project.property("GHS_APP_KEY_ALIAS")
                          keyPassword project.property("GHS_APP_KEY_PASSWORD")
                      }
                  }
              }

          """

          if "android {" not in text:
              raise SystemExit("Could not find android block in android/app/build.gradle")

          if "GHS_APP_STORE_FILE" not in text:
              text = text.replace("android {", "android {\n" + signing_block, 1)

          buildtypes_match = re.search(r'buildTypes\s*\{', text)
          if not buildtypes_match:
              raise SystemExit("Could not find buildTypes block in android/app/build.gradle")

          release_match = re.search(r'(\n\s*release\s*\{)', text[buildtypes_match.start():])
          if not release_match:
              raise SystemExit("Could not find release block inside buildTypes in android/app/build.gradle")

          release_pos = buildtypes_match.start() + release_match.start(1)

          insertion = """
                      if (project.hasProperty("GHS_APP_STORE_FILE")) {
                          signingConfig signingConfigs.release
                      }
          """

          release_line_match = re.search(r'release\s*\{\n', text[release_pos:])
          if not release_line_match:
              raise SystemExit("Could not determine insertion point for buildTypes.release")

          insert_at = release_pos + release_line_match.end()

          if "signingConfig signingConfigs.release" not in text:
              text = text[:insert_at] + insertion + text[insert_at:]

          gradle.write_text(text)
          print("Patched android/app/build.gradle")
          PY
      - name: Build signed APK
        run: |
          cd android
          ./gradlew assembleRelease
      - name: Upload APK to draft release
        run: |
          mv "android/app/build/outputs/apk/release/app-release.apk" "android/app/build/outputs/apk/release/gloomhaven-${{ github.ref_name }}.apk"
          gh release upload "${{ github.ref_name }}" "android/app/build/outputs/apk/release/gloomhaven-${{ github.ref_name }}.apk" --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}

  publish:
    name: Publish Draft Release
    needs: [create_release, release_zip, release_electron, release_android]
    runs-on: ubuntu-latest
    steps:
      - name: Publish draft release
        run: gh release edit "${{ github.ref_name }}" --draft=false --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}

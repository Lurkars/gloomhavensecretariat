name: Android Build

on:
  workflow_dispatch:

  workflow_run:
    workflows: ["Build and publish release"]
    types:
      - completed

jobs:
  android:
    name: Build Android
    runs-on: ubuntu-latest

    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: write

    env:
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24.x
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        run: npm run build

      - name: Add Capacitor Android platform
        run: npx cap add android || echo "Android platform already exists"

      - name: Generate Android assets
        run: |
          if [ -f resources/icon.png ]; then
            npx capacitor-assets generate --android
          else
            echo "No resources/icon.png found, skipping asset generation"
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode Android keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release-key.jks

      - name: Configure signing via gradle.properties
        run: |
          echo "GHS_APP_STORE_FILE=$(pwd)/android/app/release-key.jks" >> android/gradle.properties
          echo "GHS_APP_KEY_ALIAS=${ANDROID_KEY_ALIAS}" >> android/gradle.properties
          echo "GHS_APP_STORE_PASSWORD=${ANDROID_KEYSTORE_PASSWORD}" >> android/gradle.properties
          echo "GHS_APP_KEY_PASSWORD=${ANDROID_KEY_PASSWORD}" >> android/gradle.properties

      - name: Patch generated Android signing config
        run: |
          python <<'PY'
          from pathlib import Path
          import re

          gradle = Path("android/app/build.gradle")
          if not gradle.exists():
              raise SystemExit("android/app/build.gradle not found")

          text = gradle.read_text()

          if "GHS_APP_STORE_FILE" in text and "signingConfig signingConfigs.release" in text:
              print("Signing config already present")
              raise SystemExit(0)

          signing_block = """
              signingConfigs {
                  release {
                      if (project.hasProperty("GHS_APP_STORE_FILE")) {
                          storeFile file(project.property("GHS_APP_STORE_FILE"))
                          storePassword project.property("GHS_APP_STORE_PASSWORD")
                          keyAlias project.property("GHS_APP_KEY_ALIAS")
                          keyPassword project.property("GHS_APP_KEY_PASSWORD")
                      }
                  }
              }

          """

          if "android {" not in text:
              raise SystemExit("Could not find android block in android/app/build.gradle")

          if "GHS_APP_STORE_FILE" not in text:
              text = text.replace("android {", "android {\n" + signing_block, 1)

          buildtypes_match = re.search(r'buildTypes\s*\{', text)
          if not buildtypes_match:
              raise SystemExit("Could not find buildTypes block in android/app/build.gradle")

          release_match = re.search(r'(\n\s*release\s*\{)', text[buildtypes_match.start():])
          if not release_match:
              raise SystemExit("Could not find release block inside buildTypes in android/app/build.gradle")

          release_pos = buildtypes_match.start() + release_match.start(1)

          insertion = """
                      if (project.hasProperty("GHS_APP_STORE_FILE")) {
                          signingConfig signingConfigs.release
                      }
          """

          release_line_match = re.search(r'release\s*\{\n', text[release_pos:])
          if not release_line_match:
              raise SystemExit("Could not determine insertion point for buildTypes.release")

          insert_at = release_pos + release_line_match.end()

          if "signingConfig signingConfigs.release" not in text:
              text = text[:insert_at] + insertion + text[insert_at:]

          gradle.write_text(text)
          print("Patched android/app/build.gradle")
          PY

      - name: Build signed APK
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Rename APK
        run: |
          REF_NAME=$(echo "${GITHUB_REF##*/}" | tr / _)
          mv android/app/build/outputs/apk/release/app-release.apk android/app/build/outputs/apk/release/ghs-${REF_NAME}.apk

      - name: Upload APK artifacts (manual run)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@v7
        with:
          name: android-artifacts
          path: android/app/build/outputs/apk/release/*.apk

      - name: Upload APK to GitHub Release
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: softprops/action-gh-release@v3
        with:
          files: android/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
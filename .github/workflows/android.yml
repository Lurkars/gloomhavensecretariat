name: Android Build

on:
  workflow_dispatch:

  workflow_run:
    workflows: ["Build and publish release"]
    types:
      - completed

jobs:
  android:
    name: Build Android
    runs-on: ubuntu-latest

    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: write

    env:
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24.x
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        run: npm run build

      - name: Add Capacitor Android platform
        run: npx cap add android || echo "Android platform already exists"

      - name: Generate Android assets
        run: |
          if [ -f resources/icon.png ]; then
            npx capacitor-assets generate --android
          else
            echo "No resources/icon.png found, skipping asset generation"
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode Android keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release-key.jks

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=release-key.jks \
            -Pandroid.injected.signing.store.password=$ANDROID_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$ANDROID_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$ANDROID_KEY_PASSWORD

      - name: Rename APK
        run: |
          REF_NAME=$(echo "${GITHUB_REF##*/}" | tr / _)
          mv android/app/build/outputs/apk/release/app-release.apk android/app/build/outputs/apk/release/ghs-${REF_NAME}.apk

      - name: Upload APK artifacts (manual run)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@v5
        with:
          name: android-artifacts
          path: android/app/build/outputs/apk/release/*.apk

      - name: Upload APK to GitHub Release
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: softprops/action-gh-release@v3
        with:
          files: android/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}